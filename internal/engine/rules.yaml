- id: "CIS-FGT-01"
  title: "Admin HTTP Port Default (80)"
  trigger_path: "system.global.*"
  trigger_value: "80"
  operator: "exact"
  category: "HARDENING"
  impact_level: "H"
  section: "MGMT"
  business_impact: "La exposición del puerto 80 facilita ataques de escaneo automatizados y fuerza bruta, además de permitir la interceptación de tráfico no cifrado."
  technical_impact: "Uso de puerto estándar altamente predecible para servicios administrativos."
  remediation: "Desplazar la administración a un puerto no convencional (ej. 8443) y restringir acceso por Trusted Hosts."
  validation_step: "Verificar en 'get system global' que admin-port no sea 80."
  iso27001: "A.12.1.2"
  nist: "PR.AC-4"
  pci: "2.2.1"
  quick_fix: "config system global\n  set admin-port 8443\nend"

- id: "CIS-FGT-12"
  title: "HTTP habilitado en interfaz"
  trigger_path: "system.interface.*.allowaccess"
  trigger_value: "http"
  operator: "token_match"
  category: "HARDENING"
  impact_level: "C"
  section: "NET"
  business_impact: "El acceso por HTTP permite que las credenciales administrativas sean capturadas en texto claro por cualquier atacante con posición en la red (Man-in-the-Middle)."
  technical_impact: "Transmisión de datos sensibles sin cifrado de capa de transporte."
  remediation: "Deshabilitar HTTP en todas las interfaces y usar exclusivamente HTTPS."
  validation_step: "Ejecutar 'show system interface' y validar que 'http' no aparezca en allowaccess."
  iso27001: "A.13.1.1"
  nist: "PR.PT-4"
  pci: "2.2.3"
  quick_fix: "config system interface\n  edit [interfaz]\n    unset allowaccess http\n  next\nend"

- id: "CIS-FGT-11"
  title: "Telnet habilitado en interfaz"
  trigger_path: "system.interface.*.allowaccess"
  trigger_value: "telnet"
  operator: "token_match"
  category: "HARDENING"
  impact_level: "C"
  section: "NET"
  business_impact: "Protocolo obsoleto que expone toda la sesión administrativa a interceptación completa."
  technical_impact: "Falta total de cifrado en la comunicación de consola remota."
  remediation: "Inhabilitar Telnet inmediatamente y migrar a SSH v2."
  validation_step: "Validar que 'telnet' no sea parte del allowaccess en ninguna interfaz."
  iso27001: "A.14.1.2"
  nist: "PR.PT-4"
  pci: "2.2.3"
  quick_fix: "config system interface\n  edit [interfaz]\n    unset allowaccess telnet\n  next\nend"

- id: "CIS-FGT-17"
  title: "Admin con perfil super_admin"
  trigger_path: "system.admin.*.accprofile"
  trigger_value: "super_admin"
  operator: "exact"
  category: "HARDENING"
  impact_level: "M"
  section: "IAM"
  business_impact: "Cuentas con privilegios totales aumentan el impacto de un compromiso. Un error o abuso por parte de estos usuarios puede causar una interrupción total del servicio."
  technical_impact: "Asignación de privilegios máximos innecesarios para tareas rutinarias."
  remediation: "Crear perfiles basados en roles (RBAC) y limitar super_admin solo para emergencias."
  validation_step: "Revisar 'show system admin' y contar cuentas con accprofile super_admin."
  iso27001: "A.9.2.3"
  nist: "PR.AC-6"
  pci: "7.1.2"
  quick_fix: "Revisar privilegios y asignar un perfil de acceso restrictivo (RBAC)."

- id: "CIS-FGT-16"
  title: "Admin sin trusthost configurado"
  trigger_path: "system.admin.*.trusthost1"
  trigger_value: "0.0.0.0 0.0.0.0"
  operator: "exact"
  category: "HARDENING"
  impact_level: "H"
  section: "IAM"
  business_impact: "Permite que el administrador intente autenticarse desde cualquier dirección IP del mundo, facilitando ataques de fuerza bruta remotos."
  technical_impact: "Ausencia de restricción de capa de red para el plano de gestión."
  remediation: "Configurar trusthost con las redes de gestión autorizadas."
  validation_step: "Verificar que trusthost1 no sea '0.0.0.0 0.0.0.0' en cada administrador local."
  iso27001: "A.13.1.3"
  nist: "PR.AC-3"
  pci: "1.3.3"

- id: "CIS-FGT-26"
  title: "Política sin log de tráfico"
  trigger_path: "firewall.policy.*.logtraffic"
  trigger_value: "disable"
  operator: "exact"
  category: "HARDENING"
  impact_level: "H"
  section: "SEC"
  business_impact: "Impide el análisis forense tras un incidente y la detección de patrones de ataque en tiempo real."
  technical_impact: "Falta de visibilidad sobre el tráfico que atraviesa el plano de datos."
  remediation: "Configurar 'set logtraffic all' en todas las reglas activas."
  validation_step: "Validar en 'show firewall policy' que todas las reglas aceptadas tengan logging habilitado."

- id: "SEC-ADV-01"
  title: "Admin Local sin MFA (FortiToken)"
  trigger_path: "system.admin.*.two-factor"
  trigger_value: ""
  operator: "exact"
  category: "HARDENING"
  impact_level: "C"
  section: "IAM"
  business_impact: "Las cuentas sin MFA son vulnerables a robo de credenciales mediante phishing o reutilización de contraseñas filtradas."
  technical_impact: "Falta de un segundo factor de autenticación en el plano de control."
  remediation: "Implementar FortiToken o integración SAML con MFA."
  validation_step: "Revisar 'two-factor' en la configuración de cada administrador."

- id: "CIS-FGT-05"
  title: "Admin Timeout excesivo"
  trigger_path: "system.global.admintimeout"
  trigger_value: "480"
  operator: "exact"
  category: "HARDENING"
  impact_level: "M"
  section: "MGMT"
  business_impact: "Tiempos de espera prolongados dejan las sesiones administrativas abiertas innecesariamente, aumentando el riesgo de acceso no autorizado si la consola se deja desatendida."
  technical_impact: "Persistencia excesiva de tokens de sesión administrativa."
  remediation: "Reducir el admintimeout a un valor seguro (ej. 10 minutos)."
  validation_step: "Verificar 'get system global' y validar que admintimeout no sea el valor por defecto de 480."
  iso27001: "A.12.1.2"
  nist: "PR.AC-4"
  pci: "2.2.1"
  quick_fix: "config system global\n  set admintimeout 10\nend"

- id: "CIS-FGT-09"
  title: "Actualización de Firmware por USB Habilitada"
  trigger_path: "system.global.usb-firmware-upgrade"
  trigger_value: "enable"
  operator: "exact"
  category: "HARDENING"
  impact_level: "M"
  section: "SISTEMA"
  business_impact: "Cualquier persona con acceso físico al dispositivo podría insertar una memoria USB con un firmware modificado o malicioso y comprometer por completo el firewall."
  technical_impact: "Permite la carga de firmware de forma local sin requerir credenciales de nivel de red."
  remediation: "Deshabilitar la actualización de firmware a través de USB."
  validation_step: "Verificar en 'show system global' que usb-firmware-upgrade esté configurado como 'disable'."
  iso27001: "A.11.2.7"
  nist: "PR.AC-2"
  quick_fix: "config system global\n  set usb-firmware-upgrade disable\nend"

- id: "CIS-FGT-02"
  title: "Política de Contraseñas Fuertes Inactiva"
  trigger_path: "system.password-policy.status"
  trigger_value: "disable"
  operator: "exact"
  category: "HARDENING"
  impact_level: "H"
  section: "IAM"
  business_impact: "La falta de una política de complejidad permite a los administradores utilizar contraseñas débiles o adivinables, facilitando ataques de fuerza bruta."
  technical_impact: "Ausencia de controles criptográficos y de longitud mínima en contraseñas locales."
  remediation: "Habilitar la política de contraseñas y exigir longitud mínima de 8 caracteres y caracteres especiales."
  validation_step: "Ejecutar 'show system password-policy' y validar que status esté en 'enable'."
  iso27001: "A.9.4.3"
  nist: "PR.AC-1"
  pci: "8.2.3"
  quick_fix: "config system password-policy\n  set status enable\n  set minimum-length 8\nend"

- id: "CIS-FGT-03"
  title: "Banner de Pre-login Deshabilitado"
  trigger_path: "system.global.pre-login-banner"
  trigger_value: "disable"
  operator: "exact"
  category: "HARDENING"
  impact_level: "L"
  section: "MGMT"
  business_impact: "El banner de pre-login es un requisito legal en múltiples jurisdicciones para advertir a atacantes no autorizados que el acceso está restringido y monitoreado."
  technical_impact: "Ausencia de advertencia formal sobre el uso del sistema previo a la autenticación."
  remediation: "Habilitar el banner de pre-login en la configuración global."
  validation_step: "Verificar en 'show system global' que pre-login-banner esté configurado como 'enable'."
  iso27001: "A.9.4.1"
  nist: "PR.AC-1"
  quick_fix: "config system global\n  set pre-login-banner enable\nend"

- id: "CIS-FGT-06"
  title: "Ausencia de Centralización de Logs (Syslog/FortiAnalyzer)"
  trigger_path: "system.fortianalyzer.setting.status"
  trigger_value: "disable"
  operator: "exact"
  category: "HARDENING"
  impact_level: "H"
  section: "MGMT"
  business_impact: "¡RIESGO CRÍTICO DE ENCUBRIMIENTO! Si un atacante secuestra el firewall, lo primero que hará será borrar o manipular los registros almacenados localmente en el disco para ocultar su rastro de ransomware o exfiltración. Sin una centralización externa e inmutable (FortiAnalyzer/Syslog) enviada en tiempo real, la empresa quedará ciega, imposibilitada de realizar análisis forenses y en total incumplimiento de regulaciones como ISO 27001 o PCI-DSS."
  technical_impact: "Falta de retransmisión de logs en tiempo real hacia una plataforma de correlación SIEM o Analizador."
  remediation: "Habilitar y configurar el envío de logs a un servidor central FortiAnalyzer o Syslog."
  validation_step: "Verificar en 'show system fortianalyzer setting' que status esté habilitado ('enable')."
  iso27001: "A.12.4.1"
  nist: "PR.PT-1"
  quick_fix: "config system fortianalyzer setting\n  set status enable\nend"

- id: "CIS-FGT-13"
  title: "Cifrado TLS Débil en SSL-VPN (TLS v1.1 o menor habilitado)"
  trigger_path: "vpn.ssl.settings.ssl-min-proto-ver"
  trigger_value: "tls1-1"
  operator: "exact"
  category: "HARDENING"
  impact_level: "H"
  section: "NET"
  business_impact: "El uso de versiones obsoletas de TLS permite a atacantes realizar ataques de degradación de cifrado (como POODLE) e interceptar sesiones VPN de los usuarios."
  technical_impact: "Habilitación de suites criptográficas vulnerables e inseguras."
  remediation: "Configurar TLS 1.2 o TLS 1.3 como protocolo mínimo en la configuración de SSL-VPN."
  validation_step: "Ejecutar 'show vpn ssl settings' y validar que ssl-min-proto-ver esté configurado en tls1-2 o tls1-3."
  iso27001: "A.10.1.1"
  nist: "PR.DS-2"
  pci: "4.1"
  quick_fix: "config vpn ssl settings\n  set ssl-min-proto-ver tls1-2\nend"

- id: "CIS-FGT-18"
  title: "Comunidad SNMP Insegura por Defecto (public/private)"
  trigger_path: "system.snmp.community.*.name"
  trigger_value: "public"
  operator: "exact"
  category: "HARDENING"
  impact_level: "H"
  section: "MGMT"
  business_impact: "El uso de nombres de comunidad por defecto como 'public' permite a atacantes escanear y mapear toda la topología de red, interfaces y hosts activos a través de consultas SNMP."
  technical_impact: "Exposición de información crítica de la MIB del dispositivo mediante credenciales predecibles."
  remediation: "Cambiar los nombres de comunidad SNMP a cadenas complejas o migrar a SNMPv3 con cifrado y autenticación."
  validation_step: "Revisar 'show system snmp community' y verificar que no existan comunidades llamadas 'public' o 'private'."
  iso27001: "A.12.6.1"
  nist: "PR.AC-3"
  quick_fix: "Cambiar o eliminar la comunidad SNMP insegura en la configuración del sistema."

- id: "CIS-FGT-04"
  title: "Algoritmos CBC Débiles Habilitados en SSH"
  trigger_path: "system.global.ssh-ciphers"
  trigger_value: "des"
  operator: "token_match"
  category: "HARDENING"
  impact_level: "M"
  section: "MGMT"
  business_impact: "El uso de cifradores tipo CBC o algoritmos obsoletos (como DES/3DES) en SSH expone la consola de administración a ataques de recuperación de texto plano."
  technical_impact: "Negociación criptográfica insegura en el protocolo SSH."
  remediation: "Excluir algoritmos débiles y forzar cifradores fuertes como AES-GCM o Chacha20."
  validation_step: "Verificar en 'show system global' los cifradores configurados para SSH."
  iso27001: "A.10.1.1"
  nist: "PR.DS-2"

- id: "CIS-FGT-20"
  title: "Ping / ICMP Habilitado en Interfaz WAN Externa"
  trigger_path: "system.interface.*.allowaccess"
  trigger_value: "ping"
  operator: "token_match"
  category: "HARDENING"
  impact_level: "L"
  section: "NET"
  business_impact: "Permitir respuestas ICMP (Ping) en la interfaz WAN facilita a atacantes externos descubrir que el dispositivo está activo e iniciar escaneos de vulnerabilidades dirigidos."
  technical_impact: "Exposición innecesaria del plano de control externo a escaneo de red."
  remediation: "Deshabilitar ping en interfaces WAN externas que no requieran monitoreo ICMP público."
  validation_step: "Validar que la interfaz wan no contenga 'ping' en allowaccess."
  iso27001: "A.13.1.1"
  quick_fix: "config system interface\n  edit wan\n    unset allowaccess ping\n  next\nend"

- id: "CIS-FGT-07"
  title: "Límite de Sesiones Concurrentes de Administrador Inactivo"
  trigger_path: "system.global.admin-concurrent"
  trigger_value: "enable"
  operator: "exact"
  category: "HARDENING"
  impact_level: "M"
  section: "MGMT"
  business_impact: "No restringir sesiones concurrentes permite que múltiples administradores inicien sesión con la misma cuenta simultáneamente, impidiendo la trazabilidad de cambios."
  technical_impact: "Falta de control de exclusividad de inicio de sesión de auditoría."
  remediation: "Habilitar la exclusión de sesiones concurrentes para forzar una única sesión por usuario."
  validation_step: "Verificar 'admin-concurrent' en la configuración global."
  iso27001: "A.9.4.2"
  quick_fix: "config system global\n  set admin-concurrent disable\nend"

- id: "CIS-FGT-27"
  title: "Política de Firewall con Acción ACCEPT sin Perfiles de Seguridad (UTM)"
  trigger_path: "firewall.policy.*.utm-status"
  trigger_value: "disable"
  operator: "exact"
  category: "HARDENING"
  impact_level: "H"
  section: "SEC"
  business_impact: "Permitir tráfico a través de políticas sin inspección antivirus, filtrado web o prevención de intrusiones (IPS) expone la red interna a malware y descargas de cargas útiles maliciosas."
  technical_impact: "Tráfico permitido sin inspección de contenido en capa de aplicación (L7)."
  remediation: "Habilitar perfiles de seguridad apropiados (Antivirus, IPS, Web Filter) en todas las políticas que permitan tráfico general."
  validation_step: "Revisar 'show firewall policy' y validar que 'set utm-status enable' esté configurado en políticas activas ACCEPT."
  quick_fix: "config firewall policy\n  edit [ID]\n    set utm-status enable\n    set av-profile default\n    set ips-profile default\n  next\nend"

- id: "CIS-FGT-28"
  title: "Virtual IP (VIP) sin Restricción de Reenvío de Puertos (1-to-1 NAT Completo)"
  trigger_path: "firewall.vip.*.portforward"
  trigger_value: "disable"
  operator: "exact"
  category: "HARDENING"
  impact_level: "H"
  section: "SEC"
  business_impact: "Publicar un servidor en internet mediante una VIP sin limitar los puertos permitidos expone todos los puertos del host interno (incluyendo bases de datos, SSH, RDP) a escaneos y ataques externos directos."
  technical_impact: "Direccionamiento NAT uno a uno sin filtrado de capa de transporte (L4)."
  remediation: "Habilitar 'set portforward enable' en la configuración de la VIP y especificar únicamente los puertos estrictamente necesarios (ej. 80, 443)."
  validation_step: "Revisar 'show firewall vip' y verificar que no existan registros con 'set portforward disable' o vacíos."
  quick_fix: "config firewall vip\n  edit [VIP_NAME]\n    set portforward enable\n    set extport [PUERTO_PUBLICO]\n    set mappedport [PUERTO_PRIVADO]\n  next\nend"

- id: "INT-FW-DISABLED"
  title: "Política de Firewall Inactiva / Deshabilitada"
  trigger_path: "firewall.policy.*.status"
  trigger_value: "disable"
  operator: "exact"
  category: "INTELLIGENCE"
  impact_level: "L"
  section: "SEC"
  business_impact: "Mantener políticas de firewall deshabilitadas en la base de datos incrementa la deuda técnica, dificulta las auditorías visuales y puede llevar a activaciones erróneas o accidentales."
  technical_impact: "Políticas inactivas ocupando espacio en la base de datos de configuración."
  remediation: "Eliminar las políticas deshabilitadas si ya no son requeridas, o documentar formalmente el motivo de su desactivación."
  validation_step: "Revisar en 'show firewall policy' aquellas reglas con 'set status disable'."

- id: "FGT-80-PQC"
  title: "Criptografía Post-Cuántica (PQC) Deshabilitada en Plano de Gestión"
  affected_version: ">= 8.0.0"
  trigger_path: "system.global.post-quantum-crypto"
  trigger_value: "disable"
  operator: "exact"
  category: "HARDENING"
  impact_level: "M"
  section: "MGMT"
  business_impact: "Sin algoritmos post-cuánticos activos en la consola de gestión, el tráfico administrativo cifrado capturado hoy podría ser descifrado en el futuro por computadores cuánticos (ataque 'Harvest Now, Decrypt Later')."
  technical_impact: "Ausencia de suites de cifrado híbridas resistentes a computación cuántica en HTTPS y SSH."
  remediation: "Habilitar la criptografía post-cuántica (PQC) de forma global en los parámetros del sistema."
  validation_step: "Verificar en 'show system global' que post-quantum-crypto esté configurado como 'enable'."
  iso27001: "A.10.1.1"
  quick_fix: "config system global\n  set post-quantum-crypto enable\nend"

- id: "FGT-80-AI-LEAK"
  title: "Ausencia de Control y Gobernanza de IA Generativa (Shadow AI Leak)"
  affected_version: ">= 8.0.0"
  trigger_path: "firewall.policy.*.ai-visibility"
  trigger_value: "disable"
  operator: "exact"
  category: "HARDENING"
  impact_level: "H"
  section: "SEC"
  business_impact: "Permitir el acceso libre de los empleados a servicios de IA Generativa sin auditoría ni control de DLP expone a la empresa a fugas masivas de propiedad intelectual, código fuente y datos de clientes hacia servidores de terceros."
  technical_impact: "Ausencia de inspección especializada y filtrado de prompts/cargas de datos hacia plataformas de Inteligencia Artificial."
  remediation: "Habilitar la inspección y visibilidad de aplicaciones de IA ('set ai-visibility enable') en las políticas de salida a internet."
  validation_step: "Revisar en 'show firewall policy' que las reglas de navegación tengan activado el control y visibilidad de servicios de IA."
  quick_fix: "config firewall policy\n  edit [ID]\n    set ai-visibility enable\n  next\nend"

- id: "FGT-80-DLP-OCR"
  title: "Inspección de DLP sin Reconocimiento Óptico de Caracteres (OCR)"
  affected_version: ">= 8.0.0"
  trigger_path: "dlp.profile.*.ocr"
  trigger_value: "disable"
  operator: "exact"
  category: "HARDENING"
  impact_level: "M"
  section: "SEC"
  business_impact: "Los usuarios pueden evadir fácilmente las reglas estándar de DLP que buscan texto sensible (como números de tarjeta o contraseñas) simplemente tomando una captura de pantalla del documento y enviándola como imagen."
  technical_impact: "Incapacidad del motor de prevención de fugas de datos para inspeccionar texto dentro de archivos multimedia."
  remediation: "Habilitar la característica OCR en los perfiles activos de DLP para procesar e inspeccionar imágenes."
  validation_step: "Verificar en 'show dlp profile' que la directiva 'set ocr enable' esté configurada."
  quick_fix: "config dlp profile\n  edit [PROFILE_NAME]\n    set ocr enable\n  next\nend"

- id: "FGT-HA-HEARTBEAT"
  title: "HA Heartbeat sin Cifrado ni Autenticación"
  trigger_path: "system.ha.password"
  trigger_value: ""
  operator: "exact"
  category: "HARDENING"
  impact_level: "C"
  section: "SISTEMA"
  business_impact: "Cualquier persona conectada a la VLAN de HA puede tomar control del clúster de alta disponibilidad, provocando denegación de servicio o interceptando el tráfico replicado."
  technical_impact: "Carencia de autenticación en la sincronización de sesión (FGSP/FGCP)."
  remediation: "Configurar un password fuerte para el clúster HA."
  quick_fix: "config system ha\n  set password [TU_PASSWORD]\nend"

- id: "FGT-VPN-DH-WEAK"
  title: "VPN IPsec con Grupo DH Débil (1, 2, 5)"
  trigger_path: "vpn.ipsec.phase1-interface.*.dhgrp"
  trigger_value: "1 2 5"
  operator: "token_match"
  category: "HARDENING"
  impact_level: "H"
  section: "NET"
  business_impact: "El uso de Diffie-Hellman Groups bajos permite a atacantes descifrar la VPN mediante fuerza bruta o ataques pre-calculados (Logjam)."
  technical_impact: "Intercambio de claves criptográficas débil."
  remediation: "Eliminar DH Groups 1, 2 y 5. Utilizar 14, 19, 20 o superior."
  quick_fix: "config vpn ipsec phase1-interface\n  edit [TUNNEL]\n    set dhgrp 14 19 20\n  next\nend"

- id: "FGT-NTP-DEFAULT"
  title: "Servidor NTP por Defecto de Fortinet"
  trigger_path: "system.ntp.type"
  trigger_value: "fortinet"
  operator: "exact"
  category: "HARDENING"
  impact_level: "L"
  section: "SISTEMA"
  business_impact: "Depender del NTP público del fabricante expone al firewall a manipulaciones temporales que podrían invalidar logs forenses o afectar la validación de certificados."
  technical_impact: "Dependencia de infraestructura pública para la precisión de tiempo."
  remediation: "Configurar servidores NTP internos autenticados."
  quick_fix: "config system ntp\n  set type custom\n  config ntpserver\n    edit 1\n      set server [IP_INTERNA]\n    next\n  end\nend"

- id: "FGT-DISK-LOG-DISABLE"
  title: "Logging en Disco Local Deshabilitado"
  trigger_path: "log.disk.setting.status"
  trigger_value: "disable"
  operator: "exact"
  category: "HARDENING"
  impact_level: "M"
  section: "MGMT"
  business_impact: "Si el FortiAnalyzer o el SIEM se desconecta, se perderán todos los logs críticos. No hay caché forense."
  technical_impact: "Ausencia de buffer local de eventos de seguridad."
  remediation: "Habilitar logging a disco (si el equipo lo soporta)."
  quick_fix: "config log disk setting\n  set status enable\nend"

- id: "FGT-SSLVPN-SPLIT-TUN"
  title: "SSL-VPN sin Split Tunneling Controlado (Negate)"
  trigger_path: "vpn.ssl.web.portal.*.split-tunneling-routing-negate"
  trigger_value: "disable"
  operator: "exact"
  category: "HARDENING"
  impact_level: "M"
  section: "NET"
  business_impact: "Si no se controla el tráfico enviado a la VPN, el usuario podría usar el firewall como proxy de salida para todo su tráfico (incluyendo Netflix/Youtube), saturando el enlace y causando DoS."
  technical_impact: "Falta de optimización de rutas del cliente VPN."
  remediation: "Habilitar split-tunneling routing negate para evitar rutas por defecto."
  quick_fix: "config vpn ssl web portal\n  edit [PORTAL]\n    set split-tunneling-routing-negate enable\n  next\nend"

- id: "CIS-FGT-25"
  title: "Respaldo Automático de Configuración por Protocolo FTP Inseguro"
  trigger_path: "system.auto-backup.protocol"
  trigger_value: "ftp"
  operator: "exact"
  category: "HARDENING"
  impact_level: "H"
  section: "MGMT"
  business_impact: "Enviar respaldos automáticos de configuración por FTP sin cifrar permite a cualquier atacante interceptar el archivo completo en tránsito, obteniendo contraseñas hash de administradores y la topología entera."
  technical_impact: "Transmisión de configuración en texto claro a través de la red."
  remediation: "Configurar el respaldo automático para utilizar protocolos cifrados seguros como SFTP o HTTPS."
  validation_step: "Revisar 'show system auto-backup' o configuraciones de backup y verificar el protocolo activo."
  quick_fix: "config system auto-backup\n  set protocol sftp\nend"

- id: "FGT-DNS-CLEARTEXT"
  title: "DNS No Cifrado (Ausencia de DoT/DoH)"
  trigger_path: "system.dns.protocol"
  trigger_value: "cleartext"
  operator: "exact"
  category: "HARDENING"
  impact_level: "M"
  section: "SISTEMA"
  business_impact: "Las consultas DNS en texto claro permiten a los ISPs y atacantes locales monitorear qué dominios internos y externos consultan los empleados, facilitando el perfilado de red y ataques de suplantación."
  technical_impact: "Resolución de nombres susceptible a intercepción y spoofing."
  remediation: "Configurar el protocolo DNS a DNS-over-TLS (dot) o DNS-over-HTTPS (doh)."
  quick_fix: "config system dns\n  set protocol dot\nend"

- id: "CIS-FGT-31"
  title: "Paso de API Key en URL Query Habilitado"
  trigger_path: "system.global.rest-api-key-url-query"
  trigger_value: "enable"
  operator: "exact"
  category: "HARDENING"
  impact_level: "H"
  section: "MGMT"
  business_impact: "Transmitir claves de API en la URL de consulta permite que intermediarios, servidores proxy, historiales de navegador y herramientas de visibilidad expongan la clave en registros planos, resultando en un compromiso total de la API."
  technical_impact: "Exposición perimetral de credenciales REST API en texto claro a través de parámetros de consulta URL."
  remediation: "Deshabilitar la aceptación de API Key en el query parameter y forzar su paso a través de cabeceras HTTP de autorización."
  validation_step: "Validar que 'rest-api-key-url-query' esté configurado en 'disable'."
  quick_fix: "config system global\n  set rest-api-key-url-query disable\nend"

- id: "CIS-FGT-32"
  title: "Puerto HTTPS Administrativo en Valor por Defecto (443)"
  trigger_path: "system.global.admin-sport"
  trigger_value: "443"
  operator: "exact"
  category: "HARDENING"
  impact_level: "M"
  section: "MGMT"
  business_impact: "Utilizar el puerto estándar 443 para el portal administrativo facilita que atacantes perimetrales ubiquen la consola de gestión mediante escaneos de red automatizados."
  technical_impact: "Mayor visibilidad y exposición del plano de gestión en el puerto estándar de navegación segura."
  remediation: "Modificar el puerto administrativo HTTPS a un puerto no estándar (ej. 8443 o 10443)."
  validation_step: "Verificar que admin-sport en system global no sea 443."
  quick_fix: "config system global\n  set admin-sport 8443\nend"

- id: "CIS-FGT-33"
  title: "Puerto SSH Administrativo en Valor por Defecto (22)"
  trigger_path: "system.global.admin-ssh-port"
  trigger_value: "22"
  operator: "exact"
  category: "HARDENING"
  impact_level: "M"
  section: "MGMT"
  business_impact: "El puerto 22 es el objetivo número uno de ataques automatizados de fuerza bruta SSH en todo internet. Mantener la consola SSH del firewall en este puerto genera ruidos e intentos de login inútiles de forma continua."
  technical_impact: "Exposición de la consola SSH en el puerto estándar de comunicaciones."
  remediation: "Cambiar el puerto administrativo SSH a un valor no convencional (ej. 2222 o 8222)."
  validation_step: "Verificar que admin-ssh-port no sea 22."
  quick_fix: "config system global\n  set admin-ssh-port 2222\nend"






